backend:
  name: github
  repo: danielhussain266-lang/demo-driveways
  branch: main
  base_url: https://cms-auth.groundworkstudios.workers.dev

media_folder: "images/gallery"
public_folder: "images/gallery"

collections:

  - name: "settings"
    label: "Site Settings"
    files:

      - name: "contact"
        label: "Contact & Hours"
        file: "_data/contact.json"
        fields:
          - { label: "Phone",         name: "phone",         widget: "string" }
          - { label: "Phone (digits only, for tel: links)", name: "phone_href", widget: "string" }
          - { label: "Email",         name: "email",         widget: "string" }
          - { label: "WhatsApp Number (international, no +)", name: "whatsapp_number", widget: "string", required: false }
          - label: "Opening Hours"
            name: "hours"
            widget: "list"
            fields:
              - { label: "Day",   name: "day",   widget: "string" }
              - { label: "Hours", name: "hours", widget: "string" }

      - name: "about"
        label: "About the Business"
        file: "_data/about.json"
        fields:
          - { label: "About Text", name: "about_text", widget: "text" }
          - { label: "Years Trading", name: "years_trading", widget: "string" }

      - name: "services"
        label: "Services"
        file: "_data/services.json"
        fields:
          - label: "Services List"
            name: "services"
            widget: "list"
            field: { label: "Service Name", name: "name", widget: "string" }

  - name: "testimonials"
    label: "Testimonials"
    folder: "_data/testimonials"
    create: true
    slug: "{{name}}"
    fields:
      - { label: "Customer Name",  name: "name",     widget: "string" }
      - { label: "Location",       name: "location", widget: "string" }
      - { label: "Stars (1–5)",    name: "stars",    widget: "number", default: 5, value_type: "int", min: 1, max: 5 }
      - { label: "Review Text",    name: "text",     widget: "text" }

  - name: "gallery"
    label: "Gallery (Before & After)"
    folder: "_data/gallery"
    create: true
    slug: "{{caption}}"
    fields:
      - { label: "Caption",       name: "caption", widget: "string", hint: "e.g. Block paving driveway — Coventry" }
      - { label: "Before Photo",  name: "before",  widget: "image" }
      - { label: "After Photo",   name: "after",   widget: "image" }

  - name: "faqs"
    label: "FAQs"
    folder: "_data/faqs"
    create: true
    slug: "{{question}}"
    fields:
      - { label: "Question", name: "question", widget: "string" }
      - { label: "Answer",   name: "answer",   widget: "text" }
